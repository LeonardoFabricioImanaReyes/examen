<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlix - Aprendizaje en Streaming Leonardo Imana</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #111;
            color: #fff;
        }

        header {
            background-color: #000;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header h1 {
            color: #e50914;
            margin: 0;
        }

        nav a {
            color: #ddd;
            margin-right: 15px;
            text-decoration: none;
            font-size: 1rem;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-top: 40px;
            border-left: 5px solid #e50914;
            padding-left: 10px;
        }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>EduFlix by Leoanrdo Imaña</h1>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Categorías</a>
        <a href="#">Mi Progreso</a>
        <a href="#">Favoritos</a>
    </nav>
</header>

<div class="container">
    <!-- CATEGORÍAS -->
    <h2>Categorías</h2>
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Ciencia">
            <h3>Ciencia</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Matemáticas">
            <h3>Matemáticas</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Historia">
            <h3>Historia</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Idiomas">
            <h3>Idiomas</h3>
        </div>
    </div>
        <!-- VIDEOS -->
    <h2>Videos Educativos</h2>
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Video 1">
            <h3>Astronomía para principiantes</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Video 2">
            <h3>Álgebra básica</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Video 3">
            <h3>Historia mundial</h3>
        </div>
    </div>

    <!-- RECOMENDACIONES -->
    <h2>Recomendaciones para ti</h2>
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/250x150" alt="Recomendado">

    </div>
